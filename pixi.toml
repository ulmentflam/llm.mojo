[workspace]
authors = ["ulmentflam <johnwowen3@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "llm.mojo"
platforms = ["osx-arm64", "linux-aarch64", "linux-64"]
version = "0.1.0"

[tasks]

# mlx (osx-arm64, below) needs the __osx virtual package to prove macOS >= 13.3;
# declare the floor so the solve on Apple Silicon can satisfy it. pixi 0.72.2
# warns that this table is deprecated in favor of inline virtual packages on
# `platforms`, but its resolver still rejects that syntax ("expected a string,
# found table"), so keep this table until a newer pixi accepts the replacement.
# (The Makefile passes `pixi -q` to hide the deprecation warning meanwhile.)
[system-requirements]
macos = "14.0"

[dependencies]
mojo = "1.0.0b3.*"
max = "26.5.*"
python = ">=3.10,<3.13"
pytorch = ">=2.2"
numpy = ">=1.26"
transformers = ">=4.40"
datasets = ">=2.18"
tiktoken = ">=0.6"
pytest = ">=8.0"
pytest-xdist = ">=3"
matplotlib = ">=3.11.0,<4"

# MLX (Apple's array framework) is the third arm of the Metal training
# benchmark (scripts/benchmark_mlx.py). It builds only for Apple Silicon, so it
# is scoped to osx-arm64 — the linux-aarch64 solve must not try to resolve it.
[target.osx-arm64.dependencies]
mlx = ">=0.20"

[pypi-dependencies]
pyrefly = ">=0.16"
# Drives the git hooks (make lint / make check) via `pixi run pre-commit`, so
# contributors get it from `make install` without a separate global install.
pre-commit = ">=4.6"

[environments]
cuda = ["cuda"]

[feature.cuda.system-requirements]
cuda = "12.2"

[feature.cuda.target.linux-aarch64.dependencies]
pytorch-gpu = ">=2.2"

# x86_64 CUDA hosts (e.g. the Blackwell workstation) resolve the same GPU
# PyTorch build. Scoped per-target so the osx-arm64 solve, which has no
# pytorch-gpu, is never asked to resolve it.
[feature.cuda.target.linux-64.dependencies]
pytorch-gpu = ">=2.2"
