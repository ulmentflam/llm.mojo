[workspace]
authors = ["ulmentflam <johnwowen3@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "llm.mojo"
platforms = ["osx-arm64", "linux-aarch64"]
version = "0.1.0"

[system-requirements]
cuda = "12.2"

[tasks]

[dependencies]
mojo = "1.0.0b3.*"
max = "26.5.*"
python = ">=3.10,<3.13"
pytorch = ">=2.2"
numpy = ">=1.26"
transformers = ">=4.40"
tiktoken = ">=0.6"
pytest = ">=8.0"
pytest-xdist = ">=3"
matplotlib = ">=3.11.0,<4"

[pypi-dependencies]
pyrefly = ">=0.16"

[environments]
cuda = ["cuda"]

[feature.cuda.target.linux-aarch64.dependencies]
pytorch-gpu = ">=2.2"
